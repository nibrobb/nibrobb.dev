# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: local
  hooks:
  - id: prettier-check
    name: Prettier check
    entry: pnpm lint
    language: system
    pass_filenames: false
    types: [javascript, tsx, css, html, xml, xhtml]
    exclude_types: [yaml]
  - id: format-prettier
    name: Format
    description: Run prettier to format files
    entry: pnpm format
    language: system
    types: [javascript, tsx, css, html, xml, xhtml]
    exclude_types: [yaml]
    pass_filenames: false
  - id: pnpm-audit
    name: Audit npm packages
    entry: pnpm audit
    language: system
    pass_filenames: false
